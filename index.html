<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BrightPath Learn — LMS</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  /* ─── Tokens ────────────────────────────────────────────────────────── */
  :root{
    --bp-serif: "Cormorant Garamond", "Iowan Old Style", Georgia, serif;
    --bp-sans:  "DM Sans", ui-sans-serif, system-ui, -apple-system, sans-serif;
    --bp-mono:  "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;

    --bp-navy-900: #07182b;
    --bp-navy-800: #0a2540;
    --bp-navy-700: #11365e;
    --bp-accent:   #FFD200;
    --bp-accent-dark: #e6bd00;
    --bp-cream:    #faf8f3;
    --bp-text:     #fff;
    --bp-text-soft: rgba(255,255,255,.78);
    --bp-text-mute: rgba(255,255,255,.58);
    --bp-text-dim:  rgba(255,255,255,.4);

    --bp-glass-op: 0.10;
    --bp-glass-bg: rgba(255,255,255, var(--bp-glass-op));
    --bp-glass-border: rgba(255,255,255,.16);
    --bp-glass-border-strong: rgba(255,255,255,.28);

    --bp-r-sm: 8px;
    --bp-r-md: 14px;
    --bp-r-lg: 20px;
    --bp-r-xl: 28px;

    --bp-shadow-glass: 0 1px 0 rgba(255,255,255,.08) inset,
                       0 16px 50px rgba(2,8,20,.45);

    --bp-pad: 28px;
  }
  html[data-density="compact"]{ --bp-pad: 20px; }

  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; height:100%; }
  body{
    font-family: var(--bp-sans);
    color: var(--bp-text);
    background: var(--bp-navy-900);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height:100vh;
    overflow-x: hidden;
  }

  /* ─── Background ────────────────────────────────────────────────────── */
  .bp-bg{ position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .bp-bg-photo{
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    transform: scale(1.06);
    filter: brightness(0.7) saturate(1.05);
    animation: bp-bg-drift 60s ease-in-out infinite alternate;
  }
  html[data-bg="gradient"] .bp-bg-photo{ display:none; }
  @keyframes bp-bg-drift{
    0%   { transform: scale(1.06) translate(0,0); }
    100% { transform: scale(1.10) translate(-2%, -1%); }
  }
  .bp-bg-tint{
    position: absolute; inset:0;
    background:
      radial-gradient(120% 80% at 20% 0%,  rgba(255,210,0,.06), transparent 60%),
      radial-gradient(110% 90% at 100% 100%, rgba(34, 90, 160, .35), transparent 60%),
      linear-gradient(180deg, rgba(7,24,43,.40) 0%, rgba(7,24,43,.60) 70%, rgba(7,24,43,.78) 100%);
  }
  html[data-bg="gradient"] .bp-bg-tint{
    background:
      radial-gradient(80% 60% at 80% 0%, rgba(34, 90, 160, .35), transparent 70%),
      radial-gradient(60% 50% at 0% 100%, rgba(255,210,0,.07), transparent 70%),
      linear-gradient(180deg, var(--bp-navy-800), var(--bp-navy-900));
  }
  .bp-bg-vignette{
    position: absolute; inset:0;
    background: radial-gradient(120% 80% at 50% 100%, transparent 50%, rgba(0,0,0,.45) 100%);
  }

  /* ─── App layout ────────────────────────────────────────────────────── */
  .bp-app{ position: relative; z-index: 1; min-height: 100vh; display:flex; flex-direction:column; }
  .bp-main{ flex: 1; padding: 0 0 80px; position: relative; z-index: 1; }
  .bp-page{ max-width: 1320px; margin: 0 auto; padding: 36px 40px; }
  html[data-density="compact"] .bp-page{ padding: 24px 32px; }
  .bp-page-narrow{ max-width: 920px; }

  /* ─── Typography ────────────────────────────────────────────────────── */
  .bp-h-display{
    font-family: var(--bp-serif);
    font-weight: 500;
    font-size: clamp(36px, 4.8vw, 64px);
    line-height: 1.05;
    letter-spacing: -0.005em;
    margin: 0 0 8px;
    color: #fff;
  }
  .bp-h-2{
    font-family: var(--bp-serif); font-weight: 500;
    font-size: clamp(24px, 2.2vw, 32px);
    line-height: 1.15; margin: 0 0 8px;
  }
  .bp-h-3{
    font-family: var(--bp-serif); font-weight: 600;
    font-size: 20px; line-height: 1.2; margin: 0;
  }
  .bp-mono{ font-family: var(--bp-mono); font-size: 12px; letter-spacing: .02em; }

  /* ─── Header ─────────────────────────────────────────────────────────── */
  .bp-header{ position: sticky; top: 0; z-index: 30;
    backdrop-filter: blur(18px) saturate(140%); -webkit-backdrop-filter: blur(18px) saturate(140%);
    background: rgba(7,24,43,.45);
    border-bottom: 1px solid rgba(255,255,255,.08);
  }
  .bp-header-inner{
    max-width: 1320px; margin: 0 auto;
    display: flex; align-items: center; gap: 32px;
    padding: 16px 40px;
  }
  .bp-logobtn{ background: none; border: 0; padding: 0; cursor: pointer; display: flex; align-items: center; }
  .bp-nav{ display: flex; gap: 4px; margin-left: 12px; }
  .bp-navlink{
    appearance: none; background: transparent; border: 0; color: var(--bp-text-mute);
    font-family: var(--bp-sans); font-size: 13px; font-weight: 500;
    padding: 9px 14px; border-radius: 999px; cursor: pointer;
    letter-spacing: .02em;
    transition: color .18s ease, background .18s ease;
  }
  .bp-navlink:hover{ color: #fff; background: rgba(255,255,255,.06); }
  .bp-navlink.is-active{ color: var(--bp-navy-900); background: var(--bp-accent); }
  .bp-header-right{ margin-left: auto; display: flex; align-items: center; gap: 14px; }
  .bp-rolepill{
    font-size: 10px; font-weight: 700; letter-spacing: .18em; padding: 5px 10px;
    border-radius: 999px; background: var(--bp-accent); color: var(--bp-navy-900);
  }
  .bp-user{ display:flex; align-items: center; gap: 10px; }
  .bp-avatar{
    width: 34px; height: 34px; border-radius: 50%;
    background: linear-gradient(135deg, var(--bp-accent), #e6bd00 70%);
    color: var(--bp-navy-900); display:flex; align-items:center; justify-content:center;
    font-weight: 700; font-size: 12px; letter-spacing: .04em;
    box-shadow: 0 0 0 1px rgba(255,255,255,.15);
  }
  .bp-avatar-sm{ width: 30px; height: 30px; font-size: 11px; }
  .bp-user-meta{ line-height: 1.15; }
  .bp-user-name{ font-size: 13px; font-weight: 600; }
  .bp-user-email{ font-size: 11px; color: var(--bp-text-mute); }
  .bp-iconbtn{
    appearance: none; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12);
    color: var(--bp-text-soft);
    width: 34px; height: 34px; border-radius: 10px; display:flex; align-items:center; justify-content:center;
    cursor: pointer; transition: background .18s ease, color .18s ease;
  }
  .bp-iconbtn:hover{ background: rgba(255,255,255,.12); color: #fff; }

  /* ─── Glass card ─────────────────────────────────────────────────────── */
  .bp-glass{
    background: var(--bp-glass-bg);
    border: 1px solid var(--bp-glass-border);
    border-radius: var(--bp-r-lg);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    box-shadow: var(--bp-shadow-glass);
    position: relative;
  }
  .bp-glass::before{
    content: ""; position: absolute; inset: 0;
    border-radius: inherit;
    background: linear-gradient(180deg, rgba(255,255,255,.06), transparent 40%);
    pointer-events: none;
  }

  /* ─── Buttons ────────────────────────────────────────────────────────── */
  .bp-btn{
    appearance: none; border: 0; cursor: pointer; font-family: var(--bp-sans);
    font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
    display: inline-flex; align-items: center; justify-content: center; gap: 0;
    border-radius: 999px; transition: transform .14s ease, background .18s ease, color .18s ease, box-shadow .18s ease;
    white-space: nowrap;
  }
  .bp-btn-sm{ font-size: 11px; padding: 8px 14px; }
  .bp-btn-md{ font-size: 12px; padding: 11px 20px; }
  .bp-btn-lg{ font-size: 13px; padding: 14px 28px; }
  .bp-btn-primary{ background: var(--bp-accent); color: var(--bp-navy-900); }
  .bp-btn-primary:hover:not(:disabled){ background: #ffdf3d; transform: translateY(-1px); box-shadow: 0 8px 22px rgba(255,210,0,.25); }
  .bp-btn-ghost{ background: rgba(255,255,255,.08); color: #fff; border: 1px solid rgba(255,255,255,.18); }
  .bp-btn-ghost:hover:not(:disabled){ background: rgba(255,255,255,.16); transform: translateY(-1px); }
  .bp-btn:disabled{ opacity: .45; cursor: not-allowed; }

  /* ─── Pills ──────────────────────────────────────────────────────────── */
  .bp-pill{
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
    padding: 5px 10px; border-radius: 999px;
    border: 1px solid transparent;
  }
  .bp-pill-neutral{ background: rgba(255,255,255,.09); color: var(--bp-text-soft); border-color: rgba(255,255,255,.12); }
  .bp-pill-accent { background: rgba(255,210,0,.16); color: var(--bp-accent); border-color: rgba(255,210,0,.35); }
  .bp-pill-success{ background: rgba(52,211,153,.16); color: #67e8c0; border-color: rgba(52,211,153,.35); }
  .bp-pill-danger { background: rgba(244,114,114,.16); color: #f99a9a; border-color: rgba(244,114,114,.35); }

  /* ─── Progress bar ───────────────────────────────────────────────────── */
  .bp-pb-wrap{ display: flex; align-items: center; gap: 10px; }
  .bp-pb{
    flex:1; background: rgba(255,255,255,.10); border-radius: 999px; overflow: hidden;
    box-shadow: inset 0 1px 0 rgba(0,0,0,.2);
  }
  .bp-pb-fill{
    height: 100%; background: linear-gradient(90deg, var(--bp-accent), #ffe14d);
    border-radius: 999px; transition: width .7s cubic-bezier(.22,.61,.36,1);
    box-shadow: 0 0 16px rgba(255,210,0,.4);
  }
  .bp-pb-label{ font-size: 12px; color: var(--bp-text-mute); font-variant-numeric: tabular-nums; }

  /* ─── Login screen ───────────────────────────────────────────────────── */
  .bp-login-wrap{
    min-height: 100vh; display: grid; grid-template-columns: minmax(0, 1fr) 1fr; gap: 60px;
    align-items: center; padding: 60px clamp(40px, 8vw, 120px);
  }
  @media (max-width: 1000px){
    .bp-login-wrap{ grid-template-columns: 1fr; gap: 40px; padding: 40px; }
    .bp-login-side{ order: -1; }
  }
  .bp-login-card{ max-width: 520px; width: 100%; }
  .bp-login-logo{ margin-bottom: 24px; }
  .bp-login-eyebrow{
    font-size: 11px; font-weight: 600; letter-spacing: .18em; text-transform: uppercase;
    color: var(--bp-text-mute); margin-bottom: 14px;
  }
  .bp-login-sub{
    color: var(--bp-text-soft); font-size: 15px; line-height: 1.55; margin: 14px 0 28px; max-width: 460px;
  }
  .bp-login-sub b{ color: var(--bp-accent); font-weight: 600; }
  .bp-login-form{ display: flex; flex-direction: column; gap: 14px; }
  .bp-field{ display: flex; flex-direction: column; gap: 6px; }
  .bp-field-lbl{ font-size: 11px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--bp-text-mute); }
  .bp-input{
    appearance: none; font-family: var(--bp-sans); font-size: 14px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.14); color: #fff;
    border-radius: 10px; padding: 12px 14px; outline: none;
    transition: background .18s ease, border-color .18s ease, box-shadow .18s ease;
  }
  .bp-input:focus{ background: rgba(255,255,255,.1); border-color: rgba(255,210,0,.5); box-shadow: 0 0 0 3px rgba(255,210,0,.16); }
  .bp-input::placeholder{ color: rgba(255,255,255,.35); }
  textarea.bp-input{ resize: vertical; min-height: 60px; }
  .bp-login-err{
    font-size: 12px; color: #f99a9a; background: rgba(244,114,114,.12);
    border: 1px solid rgba(244,114,114,.3); padding: 9px 12px; border-radius: 10px;
  }
  .bp-google-btn{
    appearance: none; cursor: pointer; display:flex; align-items:center; justify-content:center; gap: 10px;
    font-family: var(--bp-sans); font-size: 13px; font-weight: 600;
    background: #fff; color: #1f1f1f; border: 0; border-radius: 999px; padding: 12px 18px;
    transition: transform .14s ease, box-shadow .18s ease;
    margin-top: 8px;
  }
  .bp-google-btn:hover:not(:disabled){ transform: translateY(-1px); box-shadow: 0 10px 24px rgba(0,0,0,.35); }
  .bp-google-btn:disabled{ opacity: .6; cursor: wait; }
  .bp-login-or{
    text-align: center; font-size: 11px; color: var(--bp-text-dim); letter-spacing: .2em;
    margin: 4px 0; position: relative;
  }
  .bp-login-or::before, .bp-login-or::after{
    content:""; position: absolute; top: 50%; width: 40%; height: 1px;
    background: rgba(255,255,255,.1);
  }
  .bp-login-or::before{ left: 0; }
  .bp-login-or::after{ right: 0; }
  .bp-login-or span{ background: transparent; padding: 0 12px; }
  .bp-login-foot{ display: flex; justify-content: space-between; margin-top: 6px; }
  .bp-link{
    appearance: none; background: none; border: 0; color: var(--bp-accent);
    font: inherit; font-size: 12px; font-weight: 500; cursor: pointer;
    padding: 4px 0;
  }
  .bp-link:hover{ text-decoration: underline; }
  .bp-link-danger{ color: #f99a9a; }

  .bp-login-side{ max-width: 480px; }
  .bp-login-side-h{
    font-family: var(--bp-serif); font-weight: 500; font-size: clamp(28px, 3.2vw, 44px);
    line-height: 1.15; color: #fff; margin: 16px 0 28px;
  }
  .bp-login-side-list{
    list-style: none; padding: 0; margin: 0 0 32px; display: grid; gap: 14px;
    color: var(--bp-text-soft); font-size: 15px;
  }
  .bp-login-side-list li{ display:flex; align-items:center; gap: 12px; }
  .bp-login-side-list li > span:first-child{
    display: inline-flex; flex: 0 0 8px; width: 8px; height: 8px; border-radius: 50%;
    background: var(--bp-accent); box-shadow: 0 0 12px rgba(255,210,0,.5);
  }
  .bp-login-side-list li > span:last-child{ color: var(--bp-text-soft); font-size: 15px; line-height: 1.5; }
  .bp-login-side-foot{ font-size: 11px; color: var(--bp-text-dim); letter-spacing: .04em; }

  /* ─── Welcome / Dashboard ────────────────────────────────────────────── */
  .bp-welcome{ margin-bottom: 28px; }
  .bp-welcome-eyebrow{
    font-size: 11px; font-weight: 600; letter-spacing: .22em; text-transform: uppercase;
    color: var(--bp-accent); margin-bottom: 10px;
  }
  .bp-welcome-sub{
    color: var(--bp-text-soft); font-size: 16px; line-height: 1.5; margin: 4px 0 0; max-width: 640px;
  }

  /* Continue card */
  .bp-continue{ display: grid; grid-template-columns: 1fr auto; gap: 28px; align-items: center; margin-bottom: 28px; }
  @media (max-width: 720px){ .bp-continue{ grid-template-columns: 1fr; } }
  .bp-continue-l{ min-width: 0; }
  .bp-continue-meta{ display: flex; gap: 10px; color: var(--bp-text-mute); font-size: 13px; margin-bottom: 14px; }
  .bp-continue-meta .dot{ color: var(--bp-text-dim); }
  .bp-continue-pb{ display: flex; align-items: center; gap: 14px; max-width: 520px; }
  .bp-continue-pct{ font-size: 12px; color: var(--bp-text-mute); font-variant-numeric: tabular-nums; }
  .bp-continue-r{ display: flex; flex-direction: column; gap: 10px; align-items: flex-end; }

  /* Stats row */
  .bp-stats{
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 32px;
  }
  @media (max-width: 720px){ .bp-stats{ grid-template-columns: repeat(2, 1fr); } }
  .bp-stat{ display: flex; flex-direction: column; gap: 4px; }
  .bp-stat-v{ font-family: var(--bp-serif); font-size: 32px; font-weight: 500; line-height: 1; }
  .bp-stat-l{ font-size: 12px; color: var(--bp-text-mute); letter-spacing: .02em; }

  /* Section head */
  .bp-section-head{
    display: flex; justify-content: space-between; align-items: baseline; margin: 0 0 18px;
  }
  .bp-section-meta{ font-size: 12px; color: var(--bp-text-mute); }

  /* Module grid */
  .bp-mod-grid{
    display: grid; gap: 20px;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  }
  .bp-mod-card{ overflow: hidden; display: flex; flex-direction: column; cursor: default; transition: transform .25s ease, border-color .25s ease; }
  .bp-mod-card:hover{ transform: translateY(-3px); border-color: var(--bp-glass-border-strong); }
  .bp-mod-thumb{
    position: relative; height: 130px;
    background:
      linear-gradient(135deg, rgba(255,210,0,.06), transparent 60%),
      linear-gradient(180deg, rgba(17,54,94,.7), rgba(7,24,43,.85));
    overflow: hidden;
  }
  .bp-mod-thumb-code{
    position: absolute; left: 16px; top: 14px;
    font-family: var(--bp-mono); font-size: 11px;
    color: var(--bp-accent); letter-spacing: .12em;
  }
  .bp-mod-thumb-glyph{ position: absolute; right: 8px; bottom: 8px; width: 72px; height: 72px; opacity: .55; }
  .bp-mod-body{ padding: 20px; display: flex; flex-direction: column; gap: 10px; }
  .bp-mod-cat{ font-size: 11px; color: var(--bp-text-mute); letter-spacing: .08em; text-transform: uppercase; font-weight: 600; }
  .bp-mod-title{ font-family: var(--bp-serif); font-size: 22px; line-height: 1.15; margin: 0; font-weight: 500; }
  .bp-mod-desc{ font-size: 13px; line-height: 1.5; color: var(--bp-text-soft); margin: 0; min-height: 38px; }
  .bp-mod-progress{ display: flex; align-items: center; gap: 10px; margin-top: 4px; }
  .bp-mod-pct{ font-size: 11px; color: var(--bp-text-mute); white-space: nowrap; font-variant-numeric: tabular-nums; }
  .bp-mod-cta{ display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }

  /* Category pills */
  .bp-cat-row{ display: flex; flex-wrap: wrap; gap: 8px; margin: 4px 0 24px; }
  .bp-cat-pill{
    appearance: none; cursor: pointer; font-family: var(--bp-sans); font-size: 12px; font-weight: 600;
    letter-spacing: .04em; padding: 8px 16px; border-radius: 999px;
    background: rgba(255,255,255,.06); color: var(--bp-text-soft); border: 1px solid rgba(255,255,255,.12);
    transition: background .18s ease, color .18s ease, border-color .18s ease;
  }
  .bp-cat-pill:hover{ background: rgba(255,255,255,.1); }
  .bp-cat-pill.is-active{ background: var(--bp-accent); color: var(--bp-navy-900); border-color: transparent; }

  /* ─── Module deck viewer ─────────────────────────────────────────────── */
  .bp-deck-wrap{ max-width: 1280px; margin: 0 auto; padding: 28px 40px 32px; min-height: calc(100vh - 80px); display: flex; flex-direction: column; }
  .bp-deck-topbar{
    display: flex; align-items: center; justify-content: space-between; gap: 20px; margin-bottom: 20px;
  }
  .bp-back{
    appearance: none; cursor: pointer; background: transparent; border: 0; color: var(--bp-text-soft);
    display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; padding: 4px 0;
  }
  .bp-back:hover{ color: #fff; }
  .bp-deck-titlebar{ display: flex; align-items: center; gap: 12px; }
  .bp-deck-title-txt{ font-family: var(--bp-serif); font-size: 18px; }
  .bp-deck-counter{ font-family: var(--bp-mono); font-size: 12px; color: var(--bp-text-mute); }

  .bp-deck-stage-wrap{ flex: 1; display: flex; align-items: stretch; justify-content: center; min-height: 0; margin-bottom: 20px; }
  .bp-deck-stage{
    width: 100%; max-width: 1280px;
    min-height: 700px; height: clamp(680px, 82vh, 980px);
    display: flex; align-items: stretch; justify-content: stretch;
    overflow: hidden;
  }
  .bp-slide{
    width: 100%; padding: 28px 40px; display: flex; flex-direction: column; justify-content: center;
    position: relative;
  }
  /* Slides with images get tighter text */
  .bp-slide-with-img .bp-slide-h{
    font-size: clamp(22px, 2.2vw, 34px); margin-bottom: 14px;
  }
  .bp-slide-with-img .bp-slide-body{
    font-size: clamp(13px, 1vw, 15px); line-height: 1.5;
  }
  .bp-slide-with-img .bp-pillar-grid{ gap: 10px; }
  .bp-slide-with-img .bp-pillar{ padding: 14px; }
  .bp-slide-with-img .bp-pillar-k{ font-size: 17px; }
  .bp-slide-with-img .bp-pillar-v{ font-size: 12px; }
  .bp-slide-with-img .bp-list-big{ gap: 8px; }
  .bp-slide-with-img .bp-list-big li{ font-size: clamp(13px, 1vw, 16px); padding: 6px 0; }
  .bp-slide-with-img .bp-steps-grid{ gap: 8px; }
  .bp-slide-with-img .bp-step{ padding: 12px 16px; }
  .bp-slide-with-img .bp-step-n{ font-size: 28px; }
  .bp-slide-with-img .bp-step-h{ font-size: 16px; }
  .bp-slide-with-img .bp-step-b{ font-size: 12.5px; }
  .bp-slide-eyebrow{
    font-size: 12px; font-weight: 600; letter-spacing: .22em; text-transform: uppercase;
    color: var(--bp-accent); margin-bottom: 18px;
  }

  /* ─── Certificate ────────────────────────────────────────────────────── */

  .bp-cert-frame{
    padding: 18px;

    position: absolute; inset: 0; z-index: 0;

  .bp-cert-course{

  .bp-cert-meta{

  .bp-cert-tip{ margin: 20px auto 0; max-width: 720px; text-align: center; font-size: 12px; color: var(--bp-text-mute); }

  /* Cert grid (my certs) */
  .bp-cert-grid{ display: grid; gap: 18px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
  .bp-cert-card{ cursor: pointer; overflow: hidden; transition: transform .25s ease, border-color .25s ease; }

    padding: 18px 22px;

    flex: 1; display: flex; flex-direction: row; gap: 10px; min-height: 0; align-items: stretch;

  .bp-slide-img-frame-double{
    flex: 1; min-width: 0;

    object-fit: contain;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {

function TweakToggle({ label, value, onChange }) {

  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

// ─── Animation primitive ────────────────────────────────────────────────────
function FadeIn({ delay = 0, y = 12, children, as: As = "div", style, intensity = "medium", ...rest }) {
  const [on, setOn] = useState(false);
  useEffect(() => {
    if (intensity === "none") { setOn(true); return; }
    const id = requestAnimationFrame(() => setTimeout(() => setOn(true), delay));
    return () => cancelAnimationFrame(id);
  }, [delay, intensity]);
  const dur = intensity === "subtle" ? 520 : intensity === "cinematic" ? 900 : 700;
  const yy  = intensity === "subtle" ? Math.min(y, 8) : intensity === "cinematic" ? y + 8 : y;
  return (
    <As style={{
      opacity: on ? 1 : 0,
      transform: on ? "translateY(0)" : `translateY(${yy}px)`,
      transition: `opacity ${dur}ms cubic-bezier(.22,.61,.36,1), transform ${dur}ms cubic-bezier(.22,.61,.36,1)`,
      ...style,
    }} {...rest}>{children}</As>
  );
}

                else onNavigate({ view: l.id });
              }}>
              {l.label}
            </button>
          ))}
        </nav>
        <div className="bp-header-right">
          {role === "admin" && <span className="bp-rolepill">ADMIN</span>}
          <div className="bp-user">
            <div className="bp-avatar">{(currentUser?.name || "U").split(" ").map(s=>s[0]).slice(0,2).join("")}</div>
            <div className="bp-user-meta">
              <div className="bp-user-name">{currentUser?.name}</div>
              <div className="bp-user-email">{currentUser?.email}</div>
            </div>
          </div>
          <button className="bp-iconbtn" onClick={onLogout} title="Sign out" aria-label="Sign out">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </div>
    </header>
  );
}

}

// ─── Pill / tag ────────────────────────────────────────────────────────────
function Pill({ children, tone = "neutral", style }) {
  return <span className={`bp-pill bp-pill-${tone}`} style={style}>{children}</span>;
}

// ─── Progress bar ──────────────────────────────────────────────────────────
function ProgressBar({ value, height = 8, showLabel = false }) {
  return (
    <div className="bp-pb-wrap">
      <div className="bp-pb" style={{ height }}>

  );
}

// Learner Dashboard — Module cards grid + progress + Continue CTA top
function LearnerDashboard({ currentUser, progress, onOpenModule, onOpenCertificate, onOpenAllModules }) {
  const modules = window.BP_MODULES;

  const stats = useMemo(() => {
    let completed = 0, inProgress = 0, certs = 0, totalScore = 0, scored = 0;
    modules.forEach(m => {
      const p = progress[m.id];
      if (!p) return;
      if (p.status === "completed") { completed++; certs++; }
      else if (p.status === "in-progress") inProgress++;
      if (typeof p.score === "number") { totalScore += p.score; scored++; }
    });
    return {
      completed, inProgress, certs,
      avg: scored ? Math.round(totalScore / scored) : null,
      total: modules.length,
    };
  }, [progress, modules]);

  // Continue: first in-progress module, else first not-started UNLOCKED module
  const nextUp = useMemo(() => {
    const inProg = modules.find(m => (progress[m.id]?.status === "in-progress"));
    if (inProg) return inProg;
    const notStartedUnlocked = modules.find(m => {
      const p = progress[m.id];
      const isNew = !p || p.status === "not-started";
      return isNew && window.BP_isUnlocked(m.id, progress);
    });
    return notStartedUnlocked || modules[0];
  }, [progress, modules]);

  const nextPct = progress[nextUp.id]?.percent || 0;
  const allDone = stats.completed === stats.total;

  return (
    <div className="bp-page">
      <FadeIn delay={80}>
        <div className="bp-welcome">
          <div className="bp-welcome-eyebrow">Welcome back</div>
          <h1 className="bp-h-display">Hello, {currentUser.name.split(" ")[0]}.</h1>
          <p className="bp-welcome-sub">Continue your training — every module brings you closer to mastery.</p>
        </div>
      </FadeIn>

      {/* Continue Course strip */}
      <FadeIn delay={180}>
        <GlassCard className="bp-continue" padding={28}>
          <div className="bp-continue-l">
            <Pill tone={allDone ? "success" : "accent"}>{allDone ? "ALL MODULES COMPLETE" : "CONTINUE WHERE YOU LEFT OFF"}</Pill>
            <h2 className="bp-h-2" style={{marginTop:12}}>{allDone ? "You've completed every BrightPath module." : nextUp.title}</h2>
            <div className="bp-continue-meta">
              {allDone ? (
                <>
                  <span>{stats.certs} certificates earned</span>
                  <span className="dot">·</span>
                  <span>Average score {stats.avg}%</span>
                </>
              ) : (
                <>
                  <span>{nextUp.code}</span><span className="dot">·</span>
                  <span>{nextUp.category}</span><span className="dot">·</span>
                  <span>{nextUp.duration}</span>
                </>
              )}
            </div>
            {!allDone && (
              <div className="bp-continue-pb">
                <ProgressBar value={nextPct}/>
                <span className="bp-continue-pct">{nextPct}% complete</span>
              </div>
            )}
          </div>
          <div className="bp-continue-r">
            {allDone ? (
              <GlassButton variant="primary" size="lg" onClick={() => onOpenCertificate(modules[modules.length - 1].id)}>
                View Certificates →
              </GlassButton>
            ) : (
              <GlassButton variant="primary" size="lg" onClick={() => onOpenModule(nextUp.id)}>
                {nextPct > 0 ? "Resume Course" : "Start Course"} →
              </GlassButton>
            )}
            <GlassButton variant="ghost" size="md" onClick={onOpenAllModules}>Browse all modules</GlassButton>
          </div>
        </GlassCard>
      </FadeIn>

      {/* Stat row */}
      <FadeIn delay={260}>
        <div className="bp-stats">
          <Stat label="Modules complete" value={`${stats.completed}/${stats.total}`}/>
          <Stat label="In progress"      value={stats.inProgress}/>
          <Stat label="Certificates"     value={stats.certs}/>
          <Stat label="Average score"    value={stats.avg !== null ? `${stats.avg}%` : "—"}/>
        </div>
      </FadeIn>

      {/* Module grid */}
      <FadeIn delay={340}>
        <div className="bp-section-head">
          <h2 className="bp-h-2">Your modules</h2>
          <span className="bp-section-meta">{modules.length} modules</span>
        </div>
      </FadeIn>

      <div className="bp-mod-grid">
        {modules.map((m, i) => {
          const p = progress[m.id] || {};
          const completed = p.status === "completed";
          const unlocked = window.BP_isUnlocked(m.id, progress);
          const prevModule = i > 0 ? modules[i - 1] : null;
          const lockedReason = prevModule
            ? `Unlocks after completing Module ${String(i).padStart(2, "0")} — ${prevModule.title}.`
            : "";
          return (
            <FadeIn key={m.id} delay={400 + i * 50}>
              <ModuleCard
                module={m}
                progress={p}
                locked={!unlocked}
                lockedReason={lockedReason}
                onOpen={() => onOpenModule(m.id)}
                onCert={completed ? () => onOpenCertificate(m.id) : null}
              />
            </FadeIn>
          );
        })}
      </div>
    </div>
  );
}

function Stat({ label, value }) {

  const completed = progress.status === "completed";
  const inProg    = progress.status === "in-progress";
  const tone      = locked ? "neutral" : completed ? "success" : inProg ? "accent" : "neutral";
  const statusLabel = locked ? "Locked" : completed ? "Completed" : inProg ? "In Progress" : "Not Started";

  return (
    <GlassCard className={"bp-mod-card " + (locked ? "is-locked" : "")} padding={0}>
      <div className="bp-mod-thumb">
        <div className="bp-mod-thumb-code">{module.code}</div>
        <div className="bp-mod-thumb-glyph" aria-hidden="true" dangerouslySetInnerHTML={{__html: window.BP_MOD_ICON(module.category)}}/>
        <Pill tone={tone} style={{position:"absolute", top:14, right:14}}>
          {locked && (
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" style={{marginRight:4}}>
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          )}
          {statusLabel}
        </Pill>
        {locked && <div className="bp-mod-lock-overlay" aria-hidden="true"/>}
      </div>
      <div className="bp-mod-body">
        <div className="bp-mod-cat">{module.category} · {module.duration}</div>
        <h3 className="bp-mod-title">{module.title}</h3>
        <p className="bp-mod-desc">{locked ? lockedReason : module.description}</p>

        <div className="bp-mod-progress">
          <ProgressBar value={pct}/>
          <span className="bp-mod-pct">{pct}%{progress.score ? ` · Score ${progress.score}%` : ""}</span>
        </div>

        <div className="bp-mod-cta">
          {locked ? (
            <GlassButton variant="ghost" size="md" disabled>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" style={{marginRight:6, verticalAlign:"-2px"}}>
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              Locked
            </GlassButton>
          ) : (
            <GlassButton variant={completed ? "ghost" : "primary"} size="md" onClick={onOpen}>
              {completed ? "Review" : inProg ? "Continue" : "Start"}
            </GlassButton>
          )}
          {onCert && !locked && (
            <GlassButton variant="ghost" size="md" onClick={onCert}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{marginRight:6, verticalAlign:"-2px"}}>
                <circle cx="12" cy="8" r="6"/><path d="M9 14l-2 7 5-3 5 3-2-7"/>
              </svg>
              Certificate
            </GlassButton>
          )}
        </div>
      </div>
    </GlassCard>
  );
}

// Module Deck Viewer — slide presentation with prev/next nav
function ModuleDeck({ moduleId, progress, onProgressUpdate, onLaunchQuiz, onExit }) {
  const module = window.BP_MODULES.find(m => m.id === moduleId);
  const slides = module.slides;
  const [idx, setIdx] = useState(0);
  const last = slides.length - 1;

  // Mark slide viewed, update progress percent (without quiz factored)
  useEffect(() => {
    const pct = Math.round(((idx + 1) / slides.length) * 100);
    // Don't downgrade — only push higher
    const existing = progress.percent || 0;
    if (pct > existing && progress.status !== "completed") {
      onProgressUpdate({ percent: pct, status: pct === 100 ? "in-progress" : "in-progress" });
    }
  }, [idx]);

  // Keyboard nav
  useEffect(() => {
    function k(e) {
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
      if (e.key === "ArrowRight") setIdx(i => Math.min(last, i + 1));
      else if (e.key === "ArrowLeft") setIdx(i => Math.max(0, i - 1));
      else if (e.key === "Escape") onExit();
    }
    window.addEventListener("keydown", k);
    return () => window.removeEventListener("keydown", k);
  }, [last]);

  const slide = slides[idx];
  const onLast = idx === last;

  return (
    <div className="bp-deck-wrap">
      <FadeIn delay={60}>
        <div className="bp-deck-topbar">
          <button className="bp-back" onClick={onExit}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
            <span>Back to dashboard</span>
          </button>
          <div className="bp-deck-titlebar">
            <Pill tone="accent">{module.code}</Pill>
            <span className="bp-deck-title-txt">{module.title}</span>
          </div>
          <div className="bp-deck-counter">{idx + 1} / {slides.length}</div>
        </div>
      </FadeIn>

      {/* Slide stage */}
      <div className="bp-deck-stage-wrap">
        <FadeIn key={idx} delay={40} intensity="medium" y={16}>
          <GlassCard className="bp-deck-stage" padding={0}>
            <Slide slide={slide} module={module} idx={idx} total={slides.length}/>
          </GlassCard>
        </FadeIn>
      </div>

      {/* Bottom nav */}
      <FadeIn delay={120}>
        <div className="bp-deck-nav">
          <GlassButton variant="ghost" size="lg"
                       onClick={() => setIdx(i => Math.max(0, i - 1))}
                       disabled={idx === 0}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{marginRight:8, verticalAlign:"-2px"}}>
              <polyline points="15 18 9 12 15 6"/>
            </svg>
            Previous
          </GlassButton>

          <div className="bp-deck-dots">
            {slides.map((_, i) => (
              <button
                key={i}
                className={"bp-deck-dot " + (i === idx ? "is-active" : (i < idx ? "is-done" : ""))}
                onClick={() => setIdx(i)}
                aria-label={`Slide ${i + 1}`}
              />
            ))}
          </div>

          {onLast ? (
            <GlassButton variant="primary" size="lg" onClick={onLaunchQuiz}>
              Start Knowledge Check
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{marginLeft:8, verticalAlign:"-2px"}}>
                <polyline points="9 18 15 12 9 6"/>
              </svg>
            </GlassButton>
          ) : (
            <GlassButton variant="primary" size="lg" onClick={() => setIdx(i => Math.min(last, i + 1))}>
              Next
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{marginLeft:8, verticalAlign:"-2px"}}>
                <polyline points="9 18 15 12 9 6"/>
              </svg>
            </GlassButton>
          )}
        </div>
      </FadeIn>
    </div>
  );
}

function Slide({ slide, module, idx, total }) {
  const t = slide.type;
  // Look up images for this slide
  const imgs = (window.BP_SLIDE_IMAGES?.[module.id]?.[idx]) || [];

  // Wrapper that optionally adds an image panel on the right
  function WithImages({ children, full = false }) {
    if (!imgs.length || full) return <>{children}</>;
    const isDouble = imgs.length >= 2;
    if (isDouble) {
      // Two images: text on top (compact), images side by side below (full width)
      return (
        <div className="bp-slide-double-layout">
          <div className="bp-slide-double-text">{children}</div>
          <div className="bp-slide-double-imgs">
            {imgs.map((src, i) => (
              <div key={i} className="bp-slide-img-frame bp-slide-img-frame-double">
                <img src={src} alt="" loading="lazy"/>
              </div>
            ))}
          </div>
        </div>
      );
    }
    return (
      <div className="bp-slide-with-img">
        <div className="bp-slide-text-col">{children}</div>
        <div className="bp-slide-img-col">
          {imgs.map((src, i) => (
            <div key={i} className="bp-slide-img-frame">
              <img src={src} alt="" loading="lazy"/>
            </div>
          ))}
        </div>
      </div>
    );
  }

  if (t === "cover") {
    return (
      <div className="bp-slide bp-slide-cover">
        <FadeIn delay={120}>
          <div className="bp-slide-eyebrow">{slide.eyebrow} · {module.code}</div>
          <h1 className="bp-slide-cover-title">{slide.title}</h1>
          <p className="bp-slide-cover-sub"><em>{slide.subtitle}</em></p>
          <p className="bp-slide-body" style={{maxWidth: 720, marginTop: 28}}>{slide.body}</p>
        </FadeIn>
        <FadeIn delay={420}>
          <div className="bp-slide-cover-meta">
            <span>{module.duration}</span><span className="dot">·</span>
            <span>{module.category}</span><span className="dot">·</span>
            <span>{module.quiz.length} question check</span>
          </div>
        </FadeIn>
      </div>
    );
  }

  if (t === "content") {
    return (
      <div className="bp-slide bp-slide-content">
        <WithImages>
          <FadeIn delay={100}><h2 className="bp-slide-h">{slide.title}</h2></FadeIn>
          <FadeIn delay={220}><div className="bp-slide-body" style={{whiteSpace:"pre-line"}}>{slide.body}</div></FadeIn>
        </WithImages>
      </div>
    );
  }

  if (t === "pillars") {
    return (
      <div className="bp-slide bp-slide-pillars">
        <WithImages>
          <FadeIn delay={100}><h2 className="bp-slide-h">{slide.title}</h2></FadeIn>
          <div className="bp-pillar-grid">
            {slide.items.map((it, i) => (
              <FadeIn key={i} delay={220 + i * 90}>
                <div className="bp-pillar">
                  <div className="bp-pillar-num">{String(i+1).padStart(2,"0")}</div>
                  <div className="bp-pillar-k">{it.k}</div>
                  <div className="bp-pillar-v">{it.v}</div>
                </div>
              </FadeIn>
            ))}
          </div>
        </WithImages>

// Knowledge Check Quiz — MCQ + scenario, 80% pass, certificate prompt
function QuizScreen({ moduleId, onPass, onRetake, onExit, onViewCertificate, onNextModule, passingScore = 80 }) {
  const module = window.BP_MODULES.find(m => m.id === moduleId);
  const questions = module.quiz;

  const [step, setStep]       = useState("intro"); // intro | running | results
  const [idx, setIdx]         = useState(0);
  const [answers, setAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [showCongrats, setShowCongrats] = useState(false);

  const score = useMemo(() => {
    let n = 0;
    questions.forEach((q, i) => { if (answers[i] === q.answer) n++; });
    return { correct: n, total: questions.length, pct: Math.round((n / questions.length) * 100) };
  }, [answers, questions]);

  const allAnswered = Object.keys(answers).length === questions.length;
  const passed = score.pct >= passingScore;

  function start() {
    setStep("running"); setIdx(0); setAnswers({}); setSubmitted(false);
  }
  function submit() {
    setSubmitted(true); setStep("results");
    if (score.pct >= passingScore) {
      onPass({ score: score.pct });
      // Show celebration modal after a tiny beat
      setTimeout(() => setShowCongrats(true), 350);
    }
  }
  function retake() {
    setStep("running"); setIdx(0); setAnswers({}); setSubmitted(false);
    onRetake?.();
  }

  const isLastModule = window.BP_MODULES[window.BP_MODULES.length - 1].id === moduleId;

  // ── INTRO ───────────────────────────────────────────────────────────────
  if (step === "intro") {
    return (
      <div className="bp-page bp-page-narrow">
        <FadeIn delay={80}>
          <button className="bp-back" onClick={onExit}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
            <span>Back to module</span>
          </button>
        </FadeIn>

        <FadeIn delay={160}>
          <GlassCard className="bp-quiz-intro" padding={48}>
            <Pill tone="accent">KNOWLEDGE CHECK</Pill>
            <h1 className="bp-h-display" style={{marginTop:16}}>{module.title}</h1>
            <p className="bp-quiz-sub">{questions.length} questions · No time limit · Passing score <b>{passingScore}%</b></p>

            <div className="bp-quiz-rules">
              <div className="bp-quiz-rule">
                <div className="bp-quiz-rule-n">01</div>
                <div><b>Multiple choice &amp; scenarios.</b> Choose the single best answer.</div>
              </div>
              <div className="bp-quiz-rule">
                <div className="bp-quiz-rule-n">02</div>
                <div><b>Review before submitting.</b> You can change any answer until you submit.</div>
              </div>
              <div className="bp-quiz-rule">
                <div className="bp-quiz-rule-n">03</div>
                <div><b>Earn your certificate.</b> Score {passingScore}% or higher to unlock the BrightPath certificate of completion.</div>
              </div>
            </div>

            <GlassButton variant="primary" size="lg" onClick={start} style={{marginTop:28}}>Begin Check →</GlassButton>
          </GlassCard>
        </FadeIn>
      </div>
    );
  }

  // ── RUNNING ─────────────────────────────────────────────────────────────
  if (step === "running") {
    const q = questions[idx];
    const sel = answers[idx];
    return (
      <div className="bp-page bp-page-narrow">
        <FadeIn delay={40}>
          <div className="bp-quiz-topbar">
            <span className="bp-quiz-counter">Question {idx + 1} <span style={{opacity:.5}}>of {questions.length}</span></span>
            <div className="bp-quiz-bar"><div style={{width: `${((idx + (sel !== undefined ? 1 : 0)) / questions.length) * 100}%`}}/></div>
            <button className="bp-link" onClick={onExit}>Save &amp; exit</button>
          </div>
        </FadeIn>

        <FadeIn key={idx} delay={80}>
          <GlassCard className="bp-quiz-card" padding={40}>
            <div className="bp-quiz-q-eyebrow">{q.q.startsWith("Scenario") ? "SCENARIO" : "QUESTION"}</div>
            <h2 className="bp-quiz-q">{q.q}</h2>

            <div className="bp-quiz-choices">
              {q.choices.map((c, ci) => {
                const isSel = sel === ci;
                return (
                  <button key={ci}
                          className={"bp-quiz-choice " + (isSel ? "is-selected" : "")}
                          onClick={() => setAnswers(a => ({ ...a, [idx]: ci }))}>
                    <span className="bp-choice-letter">{String.fromCharCode(65 + ci)}</span>
                    <span className="bp-choice-text">{c}</span>
                    {isSel && (
                      <svg className="bp-choice-check" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                        <polyline points="20 6 9 17 4 12"/>
                      </svg>
                    )}
                  </button>
                );
              })}
            </div>
          </GlassCard>
        </FadeIn>

        <FadeIn delay={140}>
          <div className="bp-quiz-nav">
            <GlassButton variant="ghost" size="lg" disabled={idx === 0} onClick={() => setIdx(i => Math.max(0, i - 1))}>
              ← Previous
            </GlassButton>
            {idx < questions.length - 1 ? (
              <GlassButton variant="primary" size="lg" disabled={sel === undefined} onClick={() => setIdx(i => i + 1)}>
                Next →
              </GlassButton>
            ) : (
              <GlassButton variant="primary" size="lg" disabled={!allAnswered} onClick={submit}>
                Submit Answers
              </GlassButton>
            )}
          </div>
        </FadeIn>
      </div>
    );
  }

  // ── RESULTS ─────────────────────────────────────────────────────────────
  return (
    <div className="bp-page bp-page-narrow">
      <FadeIn delay={80}>        <GlassCard className={"bp-quiz-results " + (passed ? "is-pass" : "is-fail")} padding={48}>
          <div className={"bp-result-badge " + (passed ? "is-pass" : "is-fail")}>
            {passed ? (
              <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            ) : (
              <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            )}
          </div>
          <Pill tone={passed ? "success" : "danger"} style={{margin: "0 auto 14px", display:"inline-block"}}>
            {passed ? "PASSED" : "NOT YET — TRY AGAIN"}
          </Pill>
          <h1 className="bp-h-display" style={{textAlign:"center", marginBottom:8}}>
            {passed ? "Congratulations!" : "Close — keep going."}
          </h1>
          <div className="bp-result-score">
            <span className="bp-result-score-n">{score.pct}<small>%</small></span>
            <span className="bp-result-score-d">{score.correct} of {score.total} correct · Passing {passingScore}%</span>
          </div>

          {passed ? (
            <div className="bp-result-cta">
              <p className="bp-result-msg">You've completed <b>{module.title}</b>. Your certificate is ready.</p>
              <div className="bp-result-btn-row">
                <GlassButton variant="primary" size="lg" onClick={onViewCertificate}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" style={{marginRight:8, verticalAlign:"-2px"}}>
                    <circle cx="12" cy="8" r="6"/><path d="M9 14l-2 7 5-3 5 3-2-7"/>
                  </svg>
                  View &amp; Download Certificate
                </GlassButton>
                <GlassButton variant="ghost" size="lg" onClick={onExit}>Return to dashboard</GlassButton>
              </div>
            </div>
          ) : (
            <div className="bp-result-cta">
              <p className="bp-result-msg">Review the module and try the check again — you've got this.</p>
              <div className="bp-result-btn-row">
                <GlassButton variant="primary" size="lg" onClick={retake}>Retake Assessment</GlassButton>
                <GlassButton variant="ghost" size="lg" onClick={onExit}>Review Module</GlassButton>
              </div>
            </div>
          )}

          {/* Review answers */}
          <div className="bp-result-review">
            <h3 className="bp-h-3" style={{marginBottom:14}}>Your answers</h3>
            {questions.map((q, i) => {
              const correct = answers[i] === q.answer;
              return (
                <div key={i} className={"bp-review-item " + (correct ? "is-ok" : "is-x")}>
                  <div className="bp-review-num">{i + 1}</div>
                  <div className="bp-review-body">
                    <div className="bp-review-q">{q.q}</div>
                    <div className="bp-review-a">
                      <span className={correct ? "ok" : "x"}>Your answer: {q.choices[answers[i]]}</span>
                      {!correct && (
                        <span className="ok">Correct: {q.choices[q.answer]}</span>
                      )}
                    </div>
                  </div>
                  <div className="bp-review-mark">
                    {correct ? "✓" : "✕"}
                  </div>
                </div>
              );
            })}
          </div>
        </GlassCard>
      </FadeIn>

      {showCongrats && passed && (
        <CongratsModal
          module={module}
          score={score.pct}
          isLastModule={isLastModule}
          onDownloadCert={() => { setShowCongrats(false); onViewCertificate(); }}
          onNextModule={() => { setShowCongrats(false); onNextModule && onNextModule(); }}
          onBackToDashboard={() => { setShowCongrats(false); onExit(); }}
          onClose={() => setShowCongrats(false)}
        />
      )}
    </div>
  );
}

function CertificateScreen({ moduleId, currentUser, progress, onExit, onBackToDashboard }) {

  // Generate a stable certificate ID from inputs
  const certId = `BP-${module.code}-${(currentUser.email || "user").split("@")[0].toUpperCase().slice(0,6)}-${(p.completedOn || "2026-05-27").replaceAll("-","")}`;

  const formattedDate = new Date(issueDate).toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });

  function printCert() {
    // Open new window with just the cert HTML for clean PDF printing

              </svg>
              Download Certificate

        </div>
      </FadeIn>

      <FadeIn delay={180}>

// ─── Modules tab ────────────────────────────────────────────────────────────
function AdminModules({ modules, setModules }) {
  const [query, setQuery]   = useState("");
  const [editing, setEditing] = useState(null); // module being edited / created
  const [draft, setDraft]   = useState(null);

  const filtered = modules.filter(m => (m.title + m.code + m.category).toLowerCase().includes(query.toLowerCase()));

  function startCreate() {
    setDraft({
      id: "m" + (modules.length + 1).toString().padStart(2, "0"),
      code: "BP-XXX",
      title: "New Module",
      subtitle: "",
      duration: "30 min",
      category: "Onboarding",
      description: "",
      slides: [{ type: "cover", eyebrow: "Module", title: "New Module", subtitle: "", body: "" }],
      quiz: [],
    });
    setEditing("new");
  }
  function startEdit(m) { setDraft({ ...m }); setEditing(m.id); }
  function save() {
    if (editing === "new") setModules([...modules, draft]);
    else setModules(modules.map(m => m.id === editing ? draft : m));
    setEditing(null); setDraft(null);
  }
  function del(id) {
    if (!confirm("Delete this module? This cannot be undone.")) return;
    setModules(modules.filter(m => m.id !== id));
  }

  return (
    <div className="bp-page">
      <FadeIn delay={60}>

function ModuleEditor({ draft, setDraft }) {
  const update = (k, v) => setDraft({ ...draft, [k]: v });
  const [pptName, setPptName] = useState(null);
  const [pptStatus, setPptStatus] = useState(null);
  const [promptText, setPromptText] = useState("");
  const [promptStatus, setPromptStatus] = useState(null);

  function handlePptUpload(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    setPptName(file.name);
    setPptStatus("processing");
    // Simulate processing
    setTimeout(() => {
      setPptStatus("done");
      update("subtitle", "Updated from " + file.name);
    }, 1800);
  }

  function applyPrompt() {
    if (!promptText.trim()) return;
    setPromptStatus("processing");
    setTimeout(() => {
      setPromptStatus("done");
      // Apply prompt result to description
      update("description", promptText.trim() + " (AI-generated summary pending review)");
    }, 1400);
  }

  return (
    <div className="bp-editor">
      <div className="bp-editor-row">
        <label className="bp-field">
          <span className="bp-field-lbl">Module code</span>
          <input className="bp-input" value={draft.code} onChange={e => update("code", e.target.value)}/>
        </label>
        <label className="bp-field">
          <span className="bp-field-lbl">Category</span>
          <select className="bp-input" value={draft.category} onChange={e => update("category", e.target.value)}>
            <option>Onboarding</option><option>Getting Started</option><option>Apps & Extensions</option>
            <option>Advanced</option><option>Care Practice</option><option>Compliance</option>
          </select>
        </label>
        <label className="bp-field">
          <span className="bp-field-lbl">Duration</span>
          <input className="bp-input" value={draft.duration} onChange={e => update("duration", e.target.value)}/>
        </label>
      </div>
      <label className="bp-field">
        <span className="bp-field-lbl">Title</span>
        <input className="bp-input" value={draft.title} onChange={e => update("title", e.target.value)}/>
      </label>
      <label className="bp-field">
        <span className="bp-field-lbl">Subtitle</span>
        <input className="bp-input" value={draft.subtitle} onChange={e => update("subtitle", e.target.value)}/>
      </label>
      <label className="bp-field">
        <span className="bp-field-lbl">Description</span>
        <textarea className="bp-input" rows={2} value={draft.description} onChange={e => update("description", e.target.value)}/>
      </label>

      {/* PPT Upload */}
      <div className="bp-editor-section">
        <div className="bp-editor-section-h">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{color:"var(--bp-accent)"}}>
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          Upload slide deck (PPTX)
        </div>
        <label className="bp-upload-zone">
          <input type="file" accept=".pptx,.ppt" onChange={handlePptUpload} style={{display:"none"}}/>
          <div className="bp-upload-inner">
            {pptStatus === "done" ? (
              <>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#67e8c0" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
                <span style={{color:"#67e8c0"}}>{pptName} — imported</span>
              </>
            ) : pptStatus === "processing" ? (
              <>
                <span className="bp-spinner"/>
                <span style={{color:"var(--bp-accent)"}}>Processing {pptName}…</span>
              </>
            ) : (
              <>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" style={{color:"var(--bp-text-mute)"}}>
                  <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
                </svg>
                <span style={{color:"var(--bp-text-mute)", fontSize:13}}>Click to upload or drag a .pptx file</span>
              </>
            )}
          </div>
        </label>
      </div>

      {/* AI Prompt box */}
      <div className="bp-editor-section">
        <div className="bp-editor-section-h">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{color:"var(--bp-accent)"}}>
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          Generate content with AI
        </div>
        <div className="bp-field">
          <textarea className="bp-input" rows={3}
            placeholder="Describe what you want Claude to generate — e.g. 'Write a 5-slide deck on medication safety for DSPs' or 'Rewrite the description in plain language'"

        </div>
