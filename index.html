function AdminLearners({ learners, setLearners, progressByLearner, setProgressByLearner, modules }) {
  const [query, setQuery]   = useState("");
  const [editing, setEditing] = useState(null);
  const [draft, setDraft]   = useState(null);
  const [enrollFor, setEnrollFor] = useState(null);

  const filtered = learners.filter(l =>
    (l.name + l.email + l.role).toLowerCase().includes(query.toLowerCase())
  );

  function startInvite() {
    setDraft({ id: "u" + (learners.length + 1), name: "", email: "", role: "Direct Support Professional", joined: new Date().toISOString().slice(0,10), status: "Onboarding" });
    setEditing("new");
  }
  function startEdit(l) { setDraft({ ...l }); setEditing(l.id); }
  function save() {
    if (!/@(brightpath-mn|s360team)\.com$/i.test(draft.email)) { alert("Email must end with @brightpath-mn.com or @s360team.com"); return; }
    if (editing === "new") setLearners([...learners, draft]);
    else setLearners(learners.map(l => l.id === editing ? draft : l));
    setEditing(null); setDraft(null);
  }
  function remove(id) {
    if (!confirm("Remove this learner? Their progress and certificates will be archived.")) return;
    setLearners(learners.filter(l => l.id !== id));
  }

  function toggleEnroll(learnerId, moduleId) {
    setProgressByLearner(prev => {
      const userP = { ...(prev[learnerId] || {}) };
      if (userP[moduleId]) delete userP[moduleId];
      else userP[moduleId] = { percent: 0, status: "not-started" };
      return { ...prev, [learnerId]: userP };
    });
  }

  return (
    <div className="bp-page">
      <FadeIn delay={60}>
        <div className="bp-admin-head">
          <div>
            <div className="bp-welcome-eyebrow">Team</div>
            <h1 className="bp-h-display">Learners</h1>
            <p className="bp-admin-sub">{learners.length} learners · Invite staff, manage enrollment.</p>
          </div>
          <div className="bp-admin-head-actions">
            <SearchInput value={query} onChange={setQuery} placeholder="Search learners…"/>
            <GlassButton variant="primary" size="md" onClick={startInvite}>+ Invite Learner</GlassButton>
          </div>
        </div>
      </FadeIn>

      <FadeIn delay={140}>
        <GlassCard padding={0} className="bp-table-card">
          <table className="bp-table">
            <thead>
              <tr>
                <th>Learner</th>
                <th>Role</th>
                <th style={{width: 130}}>Joined</th>
                <th style={{width: 120}}>Status</th>
                <th style={{width: 140}}>Enrolled</th>
                <th style={{width: 200}}>Actions</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(l => {
                const enrollments = Object.keys(progressByLearner[l.id] || {}).length;
                return (
                  <tr key={l.id}>
                    <td>
                      <div className="bp-tbl-learner">
                        <div className="bp-avatar bp-avatar-sm">{l.name.split(" ").map(s=>s[0]).slice(0,2).join("")}</div>
                        <div>
                          <div className="bp-tbl-title">{l.name}</div>
                          <div className="bp-tbl-sub">{l.email}</div>
                        </div>
                      </div>
                    </td>
                    <td>{l.role}</td>
                    <td className="bp-mono">{l.joined}</td>
                    <td><Pill tone={l.status === "Active" ? "success" : "accent"}>{l.status}</Pill></td>
                    <td>{enrollments} / {modules.length}</td>
                    <td>
                      <div className="bp-row-actions">
                        <button className="bp-link" onClick={() => setEnrollFor(l)}>Enroll</button>
                        <button className="bp-link" onClick={() => startEdit(l)}>Edit</button>
                        <button className="bp-link bp-link-danger" onClick={() => remove(l.id)}>Remove</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </GlassCard>
      </FadeIn>

      {editing && draft && (
        <Modal onClose={() => { setEditing(null); setDraft(null); }} title={editing === "new" ? "Invite learner" : "Edit learner"}>
          <div className="bp-editor">
            <label className="bp-field">
              <span className="bp-field-lbl">Full name</span>
              <input className="bp-input" value={draft.name} onChange={e => setDraft({...draft, name: e.target.value})} placeholder="Jordan Reyes"/>
            </label>
            <label className="bp-field">
              <span className="bp-field-lbl">Work email (@brightpath-mn.com or @s360team.com)</span>
              <input className="bp-input" value={draft.email} onChange={e => setDraft({...draft, email: e.target.value})} placeholder="jordan.reyes@brightpath-mn.com"/>
            </label>
            <div className="bp-editor-row">
              <label className="bp-field">
                <span className="bp-field-lbl">Role</span>
                <select className="bp-input" value={draft.role} onChange={e => setDraft({...draft, role: e.target.value})}>
                  <option>Direct Support Professional</option>
                  <option>Case Manager</option>
                  <option>Program Lead</option>
                  <option>Trainer</option>
                  <option>Administrator</option>
                </select>
              </label>
              <label className="bp-field">
                <span className="bp-field-lbl">Status</span>
                <select className="bp-input" value={draft.status} onChange={e => setDraft({...draft, status: e.target.value})}>
                  <option>Onboarding</option><option>Active</option><option>On Leave</option>
                </select>
              </label>
            </div>
          </div>
          <div className="bp-modal-foot">
            <GlassButton variant="ghost" size="md" onClick={() => { setEditing(null); setDraft(null); }}>Cancel</GlassButton>
            <GlassButton variant="primary" size="md" onClick={save}>{editing === "new" ? "Send Invite" : "Save"}</GlassButton>
          </div>
        </Modal>
      )}

      {enrollFor && (
        <Modal onClose={() => setEnrollFor(null)} title={`Enroll ${enrollFor.name}`}>
          <p className="bp-helper" style={{marginBottom:14}}>Toggle modules on or off. Already-completed modules can't be unenrolled.</p>
          <div className="bp-enroll-list">
            {modules.map(m => {
              const userP = progressByLearner[enrollFor.id] || {};
              const isEnrolled = !!userP[m.id];
              const isCompleted = userP[m.id]?.status === "completed";
              return (
                <label key={m.id} className={"bp-enroll-row " + (isEnrolled ? "is-on" : "")}>
                  <input type="checkbox" checked={isEnrolled} disabled={isCompleted}
                         onChange={() => toggleEnroll(enrollFor.id, m.id)}/>
                  <div className="bp-enroll-meta">
                    <div className="bp-tbl-title">{m.code} · {m.title}</div>
                    <div className="bp-tbl-sub">{m.category} · {m.duration}</div>
                  </div>
                  {isCompleted && <Pill tone="success">Completed</Pill>}
                </label>
              );
            })}
          </div>
          <div className="bp-modal-foot">
            <GlassButton variant="primary" size="md" onClick={() => setEnrollFor(null)}>Done</GlassButton>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── Progress tab ───────────────────────────────────────────────────────────
function AdminProgress({ learners, modules, progressByLearner }) {
  const [filter, setFilter] = useState("");

  const rows = useMemo(() => {
    return learners.filter(l =>
      (l.name + l.email + l.role).toLowerCase().includes(filter.toLowerCase())
    ).map(l => {
      const userP = progressByLearner[l.id] || {};
      const total = modules.length;
      const completed = modules.filter(m => userP[m.id]?.status === "completed").length;
      const inProgress = modules.filter(m => userP[m.id]?.status === "in-progress").length;
      const pct = Math.round((completed / total) * 100);
      const scores = modules.map(m => userP[m.id]?.score).filter(s => typeof s === "number");
      const avg = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : null;
      return { learner: l, userP, completed, inProgress, total, pct, avg };
    });
  }, [learners, modules, progressByLearner, filter]);

  // Aggregate stats
  const totals = useMemo(() => {
    let cs = 0, ps = 0, ns = 0;
    learners.forEach(l => {
      const userP = progressByLearner[l.id] || {};
      modules.forEach(m => {
        const s = userP[m.id]?.status;
        if (s === "completed") cs++;
        else if (s === "in-progress") ps++;
        else ns++;
      });
    });
    return { cs, ps, ns, total: learners.length * modules.length };
  }, [learners, modules, progressByLearner]);

  return (
    <div className="bp-page">
      <FadeIn delay={60}>
        <div className="bp-admin-head">
          <div>
            <div className="bp-welcome-eyebrow">Reporting</div>
            <h1 className="bp-h-display">Progress Overview</h1>
            <p className="bp-admin-sub">Real-time training status across the team.</p>
          </div>
          <SearchInput value={filter} onChange={setFilter} placeholder="Search learners…"/>
        </div>
      </FadeIn>

      <FadeIn delay={140}>
        <div className="bp-stats">
          <Stat label="Active learners" value={learners.length}/>
          <Stat label="Completed enrollments" value={totals.cs}/>
          <Stat label="In progress" value={totals.ps}/>
          <Stat label="Avg completion" value={`${Math.round((totals.cs / Math.max(1, totals.total)) * 100)}%`}/>
        </div>
      </FadeIn>

      <FadeIn delay={220}>
        <GlassCard padding={0} className="bp-table-card">
          <table className="bp-table bp-progress-table">
            <thead>
              <tr>
                <th>Learner</th>
                <th style={{width: 220}}>Overall progress</th>
                <th style={{width: 110}}>Avg score</th>
                {modules.map(m => (
                  <th key={m.id} className="bp-progress-mod-h" title={m.title}>{m.code.replace("BP-","")}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {rows.map(r => (
                <tr key={r.learner.id}>
                  <td>
                    <div className="bp-tbl-learner">
                      <div className="bp-avatar bp-avatar-sm">{r.learner.name.split(" ").map(s=>s[0]).slice(0,2).join("")}</div>
                      <div>
                        <div className="bp-tbl-title">{r.learner.name}</div>
                        <div className="bp-tbl-sub">{r.learner.role}</div>
                      </div>
                    </div>
                  </td>
                  <td>
                    <div className="bp-progress-cell">
                      <ProgressBar value={r.pct}/>
                      <span className="bp-progress-cell-l">{r.completed}/{r.total}</span>
                    </div>
                  </td>
                  <td>{r.avg !== null ? <b>{r.avg}%</b> : <span style={{opacity:.4}}>—</span>}</td>
                  {modules.map(m => {
                    const p = r.userP[m.id];
                    const ch = !p ? "·" : p.status === "completed" ? "✓" : p.status === "in-progress" ? "◐" : "○";
                    const cls = !p ? "none" : p.status === "completed" ? "ok" : p.status === "in-progress" ? "mid" : "off";
                    return (
                      <td key={m.id} className={"bp-progress-cell-mini " + cls}
                          title={`${m.title}: ${p ? p.status + (p.score ? ` · ${p.score}%` : "") : "not enrolled"}`}>
                        {ch}
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </GlassCard>
      </FadeIn>
    </div>
  );
}

// ─── Certificates tab ──────────────────────────────────────────────────────
function AdminCertificates({ learners, modules, progressByLearner }) {
  const [filter, setFilter] = useState("");

  const certs = useMemo(() => {
    const out = [];
    learners.forEach(l => {
      const userP = progressByLearner[l.id] || {};
      modules.forEach(m => {
        const p = userP[m.id];
        if (p?.status === "completed") {
          out.push({
            id: `BP-${m.code}-${l.id.toUpperCase()}-${(p.completedOn || "").replaceAll("-","")}`,
            learner: l, module: m,
            score: p.score || 100,
            issued: p.completedOn || "—",
          });
        }
      });
    });
    return out.filter(c =>
      (c.learner.name + c.learner.email + c.module.title + c.module.code + c.id)
        .toLowerCase().includes(filter.toLowerCase())
    );
  }, [learners, modules, progressByLearner, filter]);

  return (
    <div className="bp-page">
      <FadeIn delay={60}>
        <div className="bp-admin-head">
          <div>
            <div className="bp-welcome-eyebrow">Records</div>
            <h1 className="bp-h-display">Certificates Archive</h1>

      </FadeIn>

      <FadeIn delay={140}>
        <GlassCard padding={0} className="bp-table-card">
          <table className="bp-table">
            <thead>
              <tr>
                <th style={{width: 260}}>Certificate ID</th>
                <th>Learner</th>
                <th>Module</th>
                <th style={{width: 90}}>Score</th>
                <th style={{width: 140}}>Issued</th>

                <tr key={c.id}>

                  <td>
                    <div className="bp-tbl-title">{c.learner.name}</div>
                    <div className="bp-tbl-sub">{c.learner.email}</div>

                  <td>
                    <div className="bp-tbl-title">{c.module.title}</div>
                    <div className="bp-tbl-sub">{c.module.code}</div>
                  </td>
                  <td><b>{c.score}%</b></td>
                  <td className="bp-mono">{c.issued}</td>
                  <td>
                    <div className="bp-row-actions">
                      <button className="bp-link">View</button>
                      <button className="bp-link">Download</button>

                  </td>

            <button className="bp-iconbtn" onClick={onClose} aria-label="Close">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
          <div className="bp-modal-body">{children}</div>
        </div>
      </FadeIn>
    </div>
  );
}

function catTone(category) {
  if (category === "Onboarding") return "accent";
  if (category === "Compliance") return "danger";
  if (category === "Care Practice") return "success";
  return "neutral";
}

window.AdminScreen = AdminScreen;

// FAQ Screen — module-linked Q&A with lock state awareness + admin edit
function FAQScreen({ progress, role }) {
  const modules = window.BP_MODULES || [];
  const [faqs, setFaqs]     = useState(window.BP_FAQS || []);
  const [query, setQuery]   = useState("");
  const [openId, setOpenId] = useState(null);
  const [editing, setEditing] = useState(null); // null | 'new' | index
  const [draftFaq, setDraftFaq] = useState(null);
  const isAdmin = role === "admin";

  function startAdd() {
    setDraftFaq({ cat: "Getting Started", q: "", a: "", moduleId: null });
    setEditing("new");
  }
  function startEdit(idx) {
    setDraftFaq({ ...faqs[idx] });
    setEditing(idx);
  }
  function saveFaq() {
    if (!draftFaq.q.trim() || !draftFaq.a.trim()) return;
    let next;
    if (editing === "new") next = [...faqs, draftFaq];
    else next = faqs.map((f, i) => i === editing ? draftFaq : f);
    setFaqs(next);
    window.BP_FAQS = next;
    setEditing(null); setDraftFaq(null);
  }
  function deleteFaq(idx) {
    if (!confirm("Delete this FAQ item?")) return;
    const next = faqs.filter((_, i) => i !== idx);
    setFaqs(next); window.BP_FAQS = next;
  }

  // Resolve lock state for a moduleId
  function isLocked(moduleId) {
    if (!moduleId) return false;
    if (role === "admin") return false;
    return !window.BP_isUnlocked(moduleId, progress || {});
  }

  function getModule(moduleId) {
    return modules.find(m => m.id === moduleId) || null;
  }

  const filtered = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return faqs;
    return faqs.filter(f =>
      (f.q + " " + f.a + " " + f.cat).toLowerCase().includes(q)
    );
  }, [query, faqs]);

  const grouped = useMemo(() => {
    const out = {};
    filtered.forEach(f => { (out[f.cat] = out[f.cat] || []).push(f); });
    return out;
  }, [filtered]);

  return (
    <div className="bp-page bp-page-narrow">
      <FadeIn delay={60}>
        <div className="bp-welcome">
          <div className="bp-welcome-eyebrow">Help Center</div>
          <h1 className="bp-h-display">Frequently asked questions</h1>
          <p className="bp-welcome-sub">Questions about BrightPath Learn, Claude, modules, certificates and admin — with module references for deeper learning.</p>
        </div>
      </FadeIn>

      <FadeIn delay={120}>
        <div className="bp-faq-search-wrap">
          <div className="bp-search" style={{flex:1}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input value={query} onChange={e => setQuery(e.target.value)} placeholder="Search questions…"/>
          </div>
          {isAdmin && (
            <GlassButton variant="primary" size="md" onClick={startAdd}>+ Add FAQ</GlassButton>
          )}
        </div>
      </FadeIn>

      {Object.keys(grouped).length === 0 ? (
        <FadeIn delay={200}>
          <GlassCard padding={36} style={{textAlign:"center"}}>
            <p className="bp-welcome-sub" style={{margin:0}}>No matching questions. Try different keywords.</p>
          </GlassCard>
        </FadeIn>
      ) : (
        Object.keys(grouped).map((cat, ci) => (
          <FadeIn key={cat} delay={180 + ci * 70}>
            <div className="bp-faq-cat">
              <h2 className="bp-h-2 bp-faq-cat-h">{cat}</h2>
              <GlassCard padding={0} className="bp-faq-list">
                {grouped[cat].map((f, i) => {
                  const id       = cat + "-" + i;
                  const open     = openId === id;
                  const locked   = isLocked(f.moduleId);
                  const mod      = f.moduleId ? getModule(f.moduleId) : null;
                  const modIdx   = mod ? modules.findIndex(m => m.id === mod.id) : -1;
                  const prevMod  = modIdx > 0 ? modules[modIdx - 1] : null;

                  return (
                    <div key={id} className={"bp-faq-item " + (open ? "is-open" : "") + (locked ? " is-locked-faq" : "")}>
                      <div className="bp-faq-q-row">
                        <button className="bp-faq-q" onClick={() => setOpenId(open ? null : id)}>
                          <div className="bp-faq-q-inner">
                            <span className="bp-faq-q-text">{f.q}</span>
                            {mod && (
                              <span className={"bp-faq-mod-badge " + (locked ? "is-locked" : "")}>
                                {locked && (
                                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" style={{marginRight:4, flexShrink:0}}>
                                    <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                  </svg>
                                )}
                                {mod.code}
                              </span>
                            )}
                          </div>
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" className="bp-faq-chev">
                            <polyline points="6 9 12 15 18 9"/>
                          </svg>
                        </button>
                        {isAdmin && (
                          <div className="bp-faq-admin-btns">
                            <button className="bp-link" style={{fontSize:11}} onClick={e => { e.stopPropagation(); startEdit(i + grouped[cat].slice(0,i).length - grouped[cat].slice(0,i).length); const realIdx = faqs.indexOf(f); startEdit(realIdx); }}>Edit</button>
                            <button className="bp-link bp-link-danger" style={{fontSize:11}} onClick={e => { e.stopPropagation(); deleteFaq(faqs.indexOf(f)); }}>Delete</button>
                          </div>
                        )}
                      </div>

                      <div className="bp-faq-a-wrap">
                        {locked ? (
                          <div className="bp-faq-locked-msg">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" style={{color:"var(--bp-accent)", marginBottom:10}}>
                              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                            <p className="bp-faq-locked-title">This answer is covered in <b>{mod.code} — {mod.title}</b>.</p>
                            <p className="bp-faq-locked-sub">
                              {prevMod
                                ? <>Complete <b>{prevMod.code} — {prevMod.title}</b> to unlock this module.</>
                                : <>This module is available. Start it from your Dashboard.</>}
                            </p>
                            <GlassButton variant="primary" size="md" style={{marginTop:12}}
                              onClick={() => { /* navigate handled by parent */ }}>
                              Go to Dashboard →
                            </GlassButton>
                          </div>
                        ) : (
                          <div className="bp-faq-a">
                            <p style={{margin:"0 0 10px"}}>{f.a}</p>
                            {mod && (
                              <div className="bp-faq-module-ref">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{color:"var(--bp-accent)", flexShrink:0}}>
                                  <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                                </svg>
                                <span>Covered in depth in <b>{mod.code} · {mod.title}</b>{progress?.[mod.id]?.status === "completed" ? " ✓" : ""}.</span>
                              </div>
                            )}
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </GlassCard>
            </div>
          </FadeIn>
        ))
      )}

      <FadeIn delay={480}>
        <GlassCard padding={32} style={{marginTop:24, textAlign:"center"}}>
          <Pill tone="accent">STILL STUCK?</Pill>
          <h2 className="bp-h-2" style={{marginTop:14, marginBottom:8}}>Reach out to your BrightPath administrator.</h2>
          <p className="bp-welcome-sub" style={{margin:0}}>
            For learning platform issues, email{" "}
            <a className="bp-link" style={{textDecoration:"underline"}} href="mailto:learning@brightpath-mn.com">learning@brightpath-mn.com</a>.
          </p>
        </GlassCard>
      </FadeIn>

      {/* FAQ Edit/Add Modal */}
      {editing !== null && draftFaq && (
        <div className="bp-modal-overlay" onClick={() => { setEditing(null); setDraftFaq(null); }}>
          <FadeIn delay={20} intensity="subtle">
            <div className="bp-modal" onClick={e => e.stopPropagation()}>
              <div className="bp-modal-head">
                <h3 className="bp-h-3">{editing === "new" ? "Add FAQ item" : "Edit FAQ item"}</h3>
                <button className="bp-iconbtn" onClick={() => { setEditing(null); setDraftFaq(null); }} aria-label="Close">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                  </svg>
                </button>
              </div>
              <div className="bp-modal-body">
                <div className="bp-editor">
                  <div className="bp-editor-row" style={{gridTemplateColumns:"1fr 1fr"}}>
                    <label className="bp-field">
                      <span className="bp-field-lbl">Category</span>
                      <select className="bp-input" value={draftFaq.cat} onChange={e => setDraftFaq({...draftFaq, cat: e.target.value})}>
                        <option>Getting Started</option><option>About Claude</option>
                        <option>Modules</option><option>Certificates</option>
                        <option>Account</option><option>Admin</option><option>Troubleshooting</option>
                      </select>
                    </label>
                    <label className="bp-field">
                      <span className="bp-field-lbl">Linked module (optional)</span>
                      <select className="bp-input" value={draftFaq.moduleId || ""} onChange={e => setDraftFaq({...draftFaq, moduleId: e.target.value || null})}>
                        <option value="">None</option>
                        {modules.map(m => <option key={m.id} value={m.id}>{m.code} — {m.title}</option>)}
                      </select>
                    </label>
                  </div>
                  <label className="bp-field">
                    <span className="bp-field-lbl">Question</span>
                    <input className="bp-input" value={draftFaq.q} onChange={e => setDraftFaq({...draftFaq, q: e.target.value})} placeholder="e.g. How do I reset my password?"/>
                  </label>
                  <label className="bp-field">
                    <span className="bp-field-lbl">Answer</span>
                    <textarea className="bp-input" rows={4} value={draftFaq.a} onChange={e => setDraftFaq({...draftFaq, a: e.target.value})} placeholder="Clear, concise answer…"/>
                  </label>
                </div>
              </div>
              <div className="bp-modal-foot">
                <GlassButton variant="ghost" size="md" onClick={() => { setEditing(null); setDraftFaq(null); }}>Cancel</GlassButton>
                <GlassButton variant="primary" size="md" onClick={saveFaq} disabled={!draftFaq.q.trim() || !draftFaq.a.trim()}>
                  {editing === "new" ? "Add to FAQ" : "Save changes"}
                </GlassButton>
              </div>
            </div>
          </FadeIn>
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────

// BrightPath LMS — main app, state, router
// ─── Tweakable defaults (persisted via host) ────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "background": "photo",
  "glassOpacity": 0.10,
  "accent": "#FFD200",
  "animation": "medium",
  "role": "learner",
  "density": "comfortable"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // ─── Auth state ──────────────────────────────────────────────────────────
  const [auth, setAuth] = useState(null); // { email, role }

  // ─── App data (modules + learners + progress) ────────────────────────────
  const [modules, setModules]   = useState(window.BP_MODULES);
  const [learners, setLearners] = useState(window.BP_LEARNERS);
  const [progressByLearner, setProgressByLearner] = useState(window.BP_SEED_PROGRESS);

  // ─── View state ──────────────────────────────────────────────────────────
  // For learner: view = 'dashboard' | 'modules' | 'certificates' | 'module' | 'quiz' | 'certificate'
  const [view, setView]               = useState("dashboard");
  const [currentModuleId, setCurrentModuleId] = useState(null);
  const [adminTab, setAdminTab]       = useState("modules");

  // ─── Current user resolution ─────────────────────────────────────────────
  const currentUser = useMemo(() => {
    if (!auth) return null;
    if (auth.role === "admin") {
      return { id: "admin", name: "Site Administrator", email: auth.email, role: "Administrator" };
    }
    // For learner: try to find existing learner record by email, else default to BP_CURRENT_LEARNER
    const match = learners.find(l => l.email.toLowerCase() === auth.email.toLowerCase());
    return match || window.BP_CURRENT_LEARNER;
  }, [auth, learners]);

  // ─── Current learner's progress slice ────────────────────────────────────
  const myProgress = useMemo(() => {
    if (!currentUser) return {};
    return progressByLearner[currentUser.id] || {};
  }, [currentUser, progressByLearner]);

  function updateMyProgress(moduleId, patch) {
    if (!currentUser) return;
    setProgressByLearner(prev => {
      const userP = { ...(prev[currentUser.id] || {}) };
      userP[moduleId] = { ...(userP[moduleId] || { percent: 0, status: "not-started" }), ...patch };
      return { ...prev, [currentUser.id]: userP };
    });
  }

  // ─── Sync tweak role with auth role ──────────────────────────────────────
  useEffect(() => {
    if (auth && auth.role !== t.role) setTweak("role", auth.role);
  }, [auth]);

  // Role switch from tweaks — instant swap (demo)
  useEffect(() => {
    if (!auth) return;
    if (t.role !== auth.role) {
      setAuth({ ...auth, role: t.role });
      setView("dashboard");
      setAdminTab("modules");
    }
  }, [t.role]);

  // ─── Density class on root ────────────────────────────────────────────────
  useEffect(() => {
    document.documentElement.dataset.density = t.density;
    document.documentElement.dataset.bg = t.background;
    document.documentElement.style.setProperty("--bp-accent", t.accent);
    document.documentElement.style.setProperty("--bp-glass-op", String(t.glassOpacity));
  }, [t.density, t.background, t.accent, t.glassOpacity]);

  // ─── Auth handlers ───────────────────────────────────────────────────────
  function handleAuth({ email, role }) {
    setAuth({ email, role });
    setTweak("role", role);
    setView("dashboard");
    setAdminTab("modules");
  }

  function handleLogout() {
    setAuth(null);
    setView("dashboard");
  }

  // ─── Background variant resolution (mix logic) ───────────────────────────
  const bgVariant = useMemo(() => {
    if (t.background === "mix") {
      // show photo on auth/dashboard, gradient elsewhere
      if (!auth) return "photo";
      if (auth.role === "learner" && (view === "dashboard" || view === "certificate")) return "photo";
      return "gradient";
    }
    return t.background; // 'photo' | 'gradient'
  }, [t.background, view, auth]);

  // ─── Render ──────────────────────────────────────────────────────────────
  return (
    <div className="bp-app" data-anim={t.animation}>
      <Background variant={bgVariant}/>

      {!auth ? (
        <LoginScreen onAuth={handleAuth}/>
      ) : (
        <>
          <Header
            role={auth.role}
            currentUser={currentUser}
            view={view}
            adminTab={adminTab}
            setAdminTab={(t) => { setAdminTab(t); }}
            onNavigate={({ view }) => setView(view)}
            onLogout={handleLogout}
          />

          <main className="bp-main">
            {auth.role === "learner" && view === "dashboard" && (
              <LearnerDashboard
                currentUser={currentUser}
                progress={myProgress}
                onOpenModule={(id) => {
                  if (!window.BP_isUnlocked(id, myProgress)) return;
                  setCurrentModuleId(id); setView("module");
                }}
                onOpenCertificate={(id) => { setCurrentModuleId(id); setView("certificate"); }}
                onOpenAllModules={() => setView("modules")}
              />
            )}

            {auth.role === "learner" && view === "modules" && (
              <AllModulesView
                progress={myProgress}
                onOpenModule={(id) => {
                  if (!window.BP_isUnlocked(id, myProgress)) return;
                  setCurrentModuleId(id); setView("module");
                }}
              />
            )}

            {auth.role === "learner" && view === "certificates" && (
              <MyCertificatesView
                progress={myProgress}
                onOpenCertificate={(id) => { setCurrentModuleId(id); setView("certificate"); }}
              />
            )}

            {auth.role === "learner" && view === "faq" && <FAQScreen progress={myProgress} role="learner"/>}

            {auth.role === "learner" && view === "module" && currentModuleId && (
              <ModuleDeck
                moduleId={currentModuleId}
                progress={myProgress[currentModuleId] || {}}
                onProgressUpdate={(patch) => updateMyProgress(currentModuleId, patch)}
                onLaunchQuiz={() => setView("quiz")}
                onExit={() => setView("dashboard")}
              />
            )}

            {auth.role === "learner" && view === "quiz" && currentModuleId && (
              <QuizScreen
                moduleId={currentModuleId}
                passingScore={80}
                onPass={({ score }) => {
                  updateMyProgress(currentModuleId, {
                    percent: 100, status: "completed", score,
                    completedOn: new Date().toISOString().slice(0,10),
                  });
                }}
                onRetake={() => {}}
                onExit={() => setView("module")}
                onViewCertificate={() => setView("certificate")}
                onNextModule={() => {
                  const i = modules.findIndex(m => m.id === currentModuleId);
                  const next = modules[i + 1];
                  if (next) { setCurrentModuleId(next.id); setView("module"); }
                  else setView("dashboard");
                }}
              />
            )}

            {auth.role === "learner" && view === "certificate" && currentModuleId && (
              <CertificateScreen
                moduleId={currentModuleId}
                currentUser={currentUser}
                progress={myProgress}
                onExit={() => setView("dashboard")}
                onBackToDashboard={() => setView("dashboard")}
              />
            )}

            {auth.role === "admin" && adminTab === "faq" && <FAQScreen progress={{}} role="admin"/>}
            {auth.role === "admin" && adminTab !== "faq" && (
              <AdminScreen
                tab={adminTab}
                modules={modules} setModules={setModules}
                learners={learners} setLearners={setLearners}
                progressByLearner={progressByLearner} setProgressByLearner={setProgressByLearner}
              />
            )}
          </main>
        </>
      )}

      {/* Tweaks panel */}
      <TweaksPanel>
        <TweakSection label="Cinematic"/>
        <TweakRadio  label="Background" value={t.background}
                     options={[
                       { value: "photo",    label: "Photo" },
                       { value: "gradient", label: "Gradient" },
                       { value: "mix",      label: "Mix" },
                     ]}
                     onChange={(v) => setTweak("background", v)}/>
        <TweakSlider label="Glass opacity" value={t.glassOpacity}
                     min={0.04} max={0.25} step={0.01}
                     format={(v) => `${Math.round(v * 100)}%`}
                     onChange={(v) => setTweak("glassOpacity", v)}/>
        <TweakRadio  label="Animation" value={t.animation}
                     options={["subtle","medium","cinematic"]}
                     onChange={(v) => setTweak("animation", v)}/>

        <TweakSection label="Theme"/>
        <TweakColor  label="Accent" value={t.accent}
                     options={["#FFD200","#F59E0B","#22D3EE","#A78BFA","#34D399"]}
                     onChange={(v) => setTweak("accent", v)}/>
        <TweakRadio  label="Density" value={t.density}
                     options={["compact","comfortable"]}
                     onChange={(v) => setTweak("density", v)}/>

        {auth && (
          <>
            <TweakSection label="Role"/>
            <TweakRadio label="View as" value={t.role}
                        options={["learner","admin"]}
                        onChange={(v) => setTweak("role", v)}/>
            <p style={{fontSize:11, color:"rgba(41,38,27,.55)", margin:"6px 0 0"}}>
              Swap roles without logging out. Admin uses <b>admin@brightpath-mn.com</b>.
            </p>
          </>
        )}
      </TweaksPanel>
    </div>
  );
}

// ─── All Modules view (learner browse) ──────────────────────────────────────
function AllModulesView({ progress, onOpenModule }) {
  const modules = window.BP_MODULES;
  const [cat, setCat] = useState("All");
  const cats = ["All", ...Array.from(new Set(modules.map(m => m.category)))];
  const filtered = cat === "All" ? modules : modules.filter(m => m.category === cat);

  return (
    <div className="bp-page">
      <FadeIn delay={60}>
        <div className="bp-welcome">
          <div className="bp-welcome-eyebrow">Catalog</div>
          <h1 className="bp-h-display">All Modules</h1>
          <p className="bp-welcome-sub">Browse the full BrightPath training library.</p>
        </div>
      </FadeIn>

      <FadeIn delay={140}>
        <div className="bp-cat-row">
          {cats.map(c => (
            <button key={c}
                    className={"bp-cat-pill " + (cat === c ? "is-active" : "")}
                    onClick={() => setCat(c)}>{c}</button>
          ))}
        </div>
      </FadeIn>

      <div className="bp-mod-grid">
        {filtered.map((m, i) => {
          const fullIdx = modules.findIndex(x => x.id === m.id);
          const unlocked = window.BP_isUnlocked(m.id, progress);
          const prevModule = fullIdx > 0 ? modules[fullIdx - 1] : null;
          const lockedReason = prevModule
            ? `Unlocks after completing Module ${String(fullIdx).padStart(2, "0")} — ${prevModule.title}.`
            : "";
          return (
            <FadeIn key={m.id} delay={200 + i * 50}>
              <ModuleCardLite module={m} progress={progress[m.id] || {}} locked={!unlocked} lockedReason={lockedReason} onOpen={() => onOpenModule(m.id)}/>
            </FadeIn>
          );
        })}
      </div>
    </div>
  );
}

function ModuleCardLite({ module, progress, onOpen, locked, lockedReason }) {
  const pct = progress.percent || 0;
  const completed = progress.status === "completed";
  return (
    <GlassCard className={"bp-mod-card " + (locked ? "is-locked" : "")} padding={0}>
      <div className="bp-mod-thumb">
        <div className="bp-mod-thumb-code">{module.code}</div>
        <div className="bp-mod-thumb-glyph" dangerouslySetInnerHTML={{__html: window.BP_MOD_ICON(module.category)}}/>
        {completed && !locked && <Pill tone="success" style={{position:"absolute", top:14, right:14}}>Completed</Pill>}
        {locked && (
          <Pill tone="neutral" style={{position:"absolute", top:14, right:14}}>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" style={{marginRight:4}}>
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            Locked
          </Pill>
        )}
        {locked && <div className="bp-mod-lock-overlay" aria-hidden="true"/>}
      </div>
      <div className="bp-mod-body">
        <div className="bp-mod-cat">{module.category} · {module.duration}</div>
        <h3 className="bp-mod-title">{module.title}</h3>
        <p className="bp-mod-desc">{locked ? lockedReason : module.description}</p>
        <div className="bp-mod-progress">
          <ProgressBar value={pct}/>
          <span className="bp-mod-pct">{pct}%</span>
        </div>
        <div className="bp-mod-cta">
          {locked ? (
            <GlassButton variant="ghost" size="md" disabled>Locked</GlassButton>
          ) : (
            <GlassButton variant={completed ? "ghost" : "primary"} size="md" onClick={onOpen}>
              {completed ? "Review" : pct > 0 ? "Continue" : "Start"}
            </GlassButton>
          )}
        </div>
      </div>
    </GlassCard>
  );
}

// ─── My Certificates view (learner) ────────────────────────────────────────
function MyCertificatesView({ progress, onOpenCertificate }) {
  const modules = window.BP_MODULES;
  const earned = modules.filter(m => progress[m.id]?.status === "completed");

  return (
    <div className="bp-page">
      <FadeIn delay={60}>
        <div className="bp-welcome">
          <div className="bp-welcome-eyebrow">Achievements</div>
          <h1 className="bp-h-display">My Certificates</h1>
          <p className="bp-welcome-sub">{earned.length} certificate{earned.length === 1 ? "" : "s"} earned · {modules.length - earned.length} to go.</p>
        </div>
      </FadeIn>

      {earned.length === 0 ? (
        <FadeIn delay={140}>
          <GlassCard padding={48} style={{textAlign:"center"}}>
            <div style={{fontSize:42, marginBottom:8, opacity:.4}}>✦</div>
            <h2 className="bp-h-2">No certificates yet.</h2>
            <p className="bp-welcome-sub">Complete a module and pass its knowledge check to earn your first certificate.</p>
          </GlassCard>
        </FadeIn>
      ) : (
        <div className="bp-cert-grid">
          {earned.map((m, i) => (
            <FadeIn key={m.id} delay={140 + i * 60}>
              <GlassCard className="bp-cert-card" padding={0} onClick={() => onOpenCertificate(m.id)}>
                <div className="bp-cert-card-preview">
                  <div className="bp-cert-card-tint"/>
                  <div className="bp-cert-card-inner">
                    <BPLogo size={32} wordmark={false}/>
                    <div className="bp-cert-card-eyebrow">Certificate of Completion</div>
                    <div className="bp-cert-card-title">{m.title}</div>
                    <div className="bp-cert-card-meta">{progress[m.id].score}% · {progress[m.id].completedOn}</div>
                  </div>
                </div>
                <div className="bp-cert-card-foot">
                  <span className="bp-mono" style={{fontSize:11, opacity:.65}}>BP-{m.code}</span>
                  <GlassButton variant="ghost" size="sm">View →</GlassButton>
                </div>
              </GlassCard>
            </FadeIn>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── Mount ──────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
